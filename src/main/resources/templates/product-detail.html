<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }
        .product-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 800px;
            margin: 50px auto;
        }
        h2 {
            color: #343a40;
            font-weight: 600;
        }
        .rating i {
            color: #FFD700;
        }
        .review-box {
            background-color: #f1f3f6;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            background-color: #007bff;
            border: none;
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="product-container">
    <h2 th:text="${product.name}"></h2>
    <p th:text="${product.description}" class="text-muted"></p>

    <!-- ⭐ Average Rating -->
    <div class="rating mb-3">
        <span th:each="i : ${#numbers.sequence(1, T(java.lang.Math).round(product.averageRating))}">
            <i class="fas fa-star"></i>
        </span>
        <span th:each="i : ${#numbers.sequence(T(java.lang.Math).round(product.averageRating) + 1, 5)}">
            <i class="far fa-star"></i>
        </span>
        <small th:text="'(' + ${product.averageRating} + ' / 5)'"></small>
    </div>

    <!-- 💬 Existing Reviews -->
    <h5 class="mt-4">Customer Reviews</h5>
    <div th:if="${product.reviews.size() == 0}">
        <p class="text-muted">No reviews yet. Be the first to review!</p>
    </div>
    <div th:each="r : ${product.reviews}" class="review-box">
        <div class="rating mb-1">
            <span th:each="i : ${#numbers.sequence(1, r.rating)}">
                <i class="fas fa-star"></i>
            </span>
            <span th:each="i : ${#numbers.sequence(r.rating + 1, 5)}">
                <i class="far fa-star"></i>
            </span>
        </div>
        <p th:text="${r.comment}"></p>
    </div>

    <!-- ✏️ Add Review Form -->
    <h5 class="mt-4">Add Your Review</h5>
    <form th:action="@{'/product/' + ${product.id} + '/add-review'}" th:object="${review}" method="post">
        <div class="mb-3">
            <label class="form-label">Rating (1–5)</label>
            <select th:field="*{rating}" class="form-select" required>
                <option value="">Select</option>
                <option th:each="i : ${#numbers.sequence(1,5)}" th:value="${i}" th:text="${i}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Comment</label>
            <textarea th:field="*{comment}" class="form-control" rows="3" placeholder="Write your review..." required></textarea>
        </div>

        <button type="submit">Submit Review</button>
    </form>

    <div class="text-center mt-3">
        <a href="/" class="btn btn-secondary btn-sm">← Back to Home</a>
    </div>
</div>

</body>
</html>
