<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product — LeapReviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.75);
            --border-color: rgba(255, 255, 255, 0.12);
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }
        body {
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 50% 10%, rgba(99, 102, 241, 0.15) 0px, transparent 60%),
                radial-gradient(at 80% 80%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        h1, h2, h3, h4, h5, .brand-font {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }
        .navbar {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }
        .navbar-brand {
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .form-container {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 650px;
            margin: 4rem auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }
        .form-control {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            padding: 0.75rem 1rem;
        }
        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #6366f1;
            color: var(--text-main);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }
        .btn-gradient {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 0.85rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }
        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .btn-back:hover {
            color: #fff;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand brand-font" href="/"><i class="fa-solid fa-layer-group me-2"></i>LeapReviews</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left me-2"></i>Back to Catalog</a>
        </div>
    </div>
</nav>

<div class="container flex-grow-1">
    <div class="form-container">
        <div class="text-center mb-4">
            <span class="badge bg-primary bg-opacity-25 text-primary mb-2 px-3 py-2 rounded-pill border border-primary border-opacity-25">Catalog Management</span>
            <h2>Add New Product</h2>
            <p class="text-muted">Expand the LeapReviews catalog with a new tech product or gadget.</p>
        </div>

        <form th:action="@{/add-product}" th:object="${product}" method="post">
            <div class="mb-3">
                <label class="form-label text-muted fw-medium">Product Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Sony WH-1000XM5 Headphones" required>
            </div>

            <div class="mb-3">
                <label class="form-label text-muted fw-medium">Image URL (Optional)</label>
                <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://images.unsplash.com/...">
            </div>

            <div class="mb-4">
                <label class="form-label text-muted fw-medium">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Describe key features, specs, and target audience..." required></textarea>
            </div>

            <button type="submit" class="btn btn-gradient"><i class="fa-solid fa-plus me-2"></i>Publish to Catalog</button>
        </form>
    </div>
</div>

<footer class="text-center py-4 text-muted mt-auto border-top" style="border-color: var(--border-color) !important;">
    <small>&copy; 2026 LeapReviews. Built with Spring Boot & Thymeleaf.</small>
</footer>

</body>
</html>
