<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }
        .form-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            padding: 30px;
            max-width: 600px;
            margin: 60px auto;
        }
        h2 {
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            color: #343a40;
        }
        button {
            width: 100%;
            background-color: #007bff;
            border: none;
            padding: 12px;
            color: white;
            border-radius: 8px;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2>➕ Add New Product</h2>

        <form th:action="@{/add-product}" th:object="${product}" method="post">
            <div class="mb-3">
                <label class="form-label">Product Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Enter product name" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Write short description" required></textarea>
            </div>

            <button type="submit">Save Product</button>
        </form>

        <div class="text-center mt-3">
            <a href="/" class="btn btn-secondary btn-sm">← Back to Home</a>
        </div>
    </div>
</div>

</body>
</html>
