<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Product — LeapReviews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root {
            --bg-dark: #090d16;
            --bg-card: rgba(26, 35, 50, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --border-hover: rgba(168, 85, 247, 0.5);
            --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            --accent-glow: rgba(168, 85, 247, 0.35);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(99, 102, 241, 0.2) 0px, transparent 60%),
                radial-gradient(circle at 80% 80%, rgba(236, 72, 153, 0.2) 0px, transparent 50%),
                radial-gradient(circle at 20% 60%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4, h5, .brand-font {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .navbar {
            background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-container {
            background: var(--bg-card);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-color);
            border-radius: 28px;
            padding: 3.5rem;
            max-width: 720px;
            margin: 4rem auto;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.15);
            position: relative;
            overflow: hidden;
        }

        .form-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--accent-gradient);
        }

        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.8) !important;
            border: 1px solid var(--border-color);
            color: var(--text-main) !important;
            border-radius: 16px;
            padding: 0.85rem 1.25rem;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.25);
        }

        .form-select option {
            background: #0f172a;
            color: #fff;
        }

        .btn-gradient {
            background: var(--accent-gradient);
            border: none;
            color: white !important;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            width: 100%;
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.35);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-size: 1.05rem;
            text-decoration: none;
        }

        .btn-gradient:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 30px rgba(236, 72, 153, 0.5);
        }

        .btn-back {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
        }

        .btn-back:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(-3px);
        }

        .badge-pill {
            background: rgba(99, 102, 241, 0.15);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 1.2rem;
        }

        footer {
            background: rgba(9, 13, 22, 0.9);
            border-top: 1px solid var(--border-color);
            padding: 2.5rem 0;
            margin-top: auto;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand brand-font" href="/"><i class="fa-solid fa-layer-group"></i>LeapReviews</a>
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="btn-back"><i class="fa-solid fa-arrow-left"></i>Back to Catalog</a>
        </div>
    </div>
</nav>

<div class="container flex-grow-1">
    <div class="form-container animate-fade-in">
        <div class="text-center mb-5">
            <span class="badge-pill"><i class="fa-solid fa-wand-magic-sparkles me-2"></i>Catalog Management</span>
            <h2 class="display-6 fw-bold mb-2">Add New Tech Product</h2>
            <p class="text-muted fs-6">Publish a new gadget to the community database to start collecting authentic reviews.</p>
        </div>

        <form th:action="@{/add-product}" th:object="${product}" method="post">
            <div class="mb-4">
                <label class="form-label text-muted fw-semibold"><i class="fa-solid fa-tag me-2 text-primary"></i>Product Name</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="e.g. Sony WH-1000XM5 Wireless Headphones" required>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label text-muted fw-semibold"><i class="fa-solid fa-folder me-2 text-info"></i>Category</label>
                    <select th:field="*{category}" class="form-select" required>
                        <option value="Audio">🎧 Audio & Headphones</option>
                        <option value="Computers">💻 Laptops & Computers</option>
                        <option value="Peripherals">🖱️ Keyboards & Peripherals</option>
                        <option value="Photography">📷 Cameras & Photography</option>
                        <option value="Tablets">📱 Tablets & Mobile</option>
                        <option value="Other">🔌 Other Tech Gadgets</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label text-muted fw-semibold"><i class="fa-solid fa-image me-2 text-warning"></i>Image URL (Optional)</label>
                    <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://images.unsplash.com/...">
                </div>
            </div>

            <div class="mb-5">
                <label class="form-label text-muted fw-semibold"><i class="fa-solid fa-align-left me-2 text-success"></i>Product Specs & Description</label>
                <textarea th:field="*{description}" class="form-control" rows="5" placeholder="Highlight core hardware specs, key performance features, battery life, and target audience..." required></textarea>
            </div>

            <button type="submit" class="btn btn-gradient"><i class="fa-solid fa-cloud-arrow-up"></i>Publish to Catalog</button>
        </form>
    </div>
</div>

<footer class="text-center">
    <div class="container">
        <p class="mb-1 text-light fw-medium brand-font"><i class="fa-solid fa-layer-group text-primary me-2"></i>LeapReviews Platform</p>
        <small class="text-muted">&copy; 2026 LeapReviews. Engineered with Spring Boot 3, JPA, & Thymeleaf.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
