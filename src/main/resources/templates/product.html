<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${product.name} + ' Reviews'">Product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f1f3f6;
            font-family: 'Poppins', sans-serif;
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .rating i {
            color: #FFD700;
        }
        .review {
            background: #fff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        textarea { resize: none; }
        .btn-custom {
            background-color: #007bff;
            color: #fff;
            border-radius: 10px;
        }
        .btn-custom:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
<div class="container my-4">
    <div class="card p-4">
        <h2 class="text-center mb-3" th:text="${product.name}"></h2>
        <p class="text-center text-muted" th:text="${product.description}"></p>
    </div>

    <div class="mt-4">
        <h3>⭐ Reviews</h3>
        <div th:each="rev : ${product.reviews}" class="review">
            <div class="d-flex justify-content-between">
                <strong th:text="${rev.username}"></strong>
                <div class="rating">
                    <span th:each="i : ${#numbers.sequence(1, rev.rating)}">
                        <i class="fas fa-star"></i>
                    </span>
                    <span th:each="i : ${#numbers.sequence(rev.rating + 1, 5)}">
                        <i class="far fa-star"></i>
                    </span>
                </div>
            </div>
            <p class="mt-2" th:text="${rev.comment}"></p>
        </div>
    </div>

    <div class="mt-5">
        <h3>Add Your Review</h3>
        <form th:action="@{'/product/' + ${product.id} + '/reviews'}" th:object="${review}" method="post">
            <div class="mb-3">
                <input type="text" th:field="*{username}" class="form-control" placeholder="Your name" required>
            </div>
            <div class="mb-3">
                <textarea th:field="*{comment}" class="form-control" placeholder="Write your review..." required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Rating</label>
                <select th:field="*{rating}" class="form-select" required>
                    <option value="">Select Rating</option>
                    <option th:each="i : ${#numbers.sequence(1,5)}"
                            th:value="${i}" th:text="${i}"></option>
                </select>
            </div>
            <button type="submit" class="btn btn-custom">Submit Review</button>
        </form>
    </div>
</div>
</body>
</html>
