<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product Review System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }
        .product-card {
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: scale(1.02);
        }
        h1 {
            text-align: center;
            margin: 30px 0;
            font-weight: 600;
            color: #343a40;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛍 Product List</h1>
	<div class="text-center mb-4">
	    <a href="/add-product" class="btn btn-success">➕ Add New Product</a>
	</div>

    <div class="row">
        <div th:each="product : ${products}" class="col-md-6 col-lg-4 mb-4">
            <div class="card product-card p-3">
                <div class="card-body text-center">
                    <h5 class="card-title" th:text="${product.name}"></h5>
                    <p class="card-text text-muted" th:text="${product.description}"></p>
                    <a th:href="@{'/product/' + ${product.id}}" class="btn btn-primary mt-2">View Reviews →</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
